{% extends 'core/base.html' %}
{% block title %}Login | SHE Report{% endblock %}
{% block content %}

<section class="section-pad">
  <div class="container">
    <div class="form-card">
      <h2 style="margin-bottom:1.5rem;">Login</h2>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p style="color:var(--danger); font-size:0.82rem; margin-top:0.25rem;">{{ field.errors.0 }}</p>{% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn-submit">Login</button>
      </form>
    </div>
  </div>
</section>

{% block extra_css %}
<style>
input[type=text], input[type=password] {
  width:100%; padding:0.75rem 1rem; border:2px solid var(--border); border-radius:10px; font-size:0.95rem;
}
input[type=text]:focus, input[type=password]:focus { outline:none; border-color:var(--primary); }
</style>
{% endblock %}
{% endblock %}
